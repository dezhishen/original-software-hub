<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Original Software Hub Favicon</title>
  <desc id="desc">Rounded square badge with sea-green gradient and OSH monogram.</desc>

  <defs>
