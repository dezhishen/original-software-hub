# GitHub 插件配置
#
# 配置优先级：
# 1. 环境变量 OSH_GITHUB_CONFIG        直接传入整段 YAML 内容
# 2. 环境变量 OSH_GITHUB_CONFIG_PATH   指定 YAML 文件路径
# 3. 当前文件 config/github.yaml
#
# Token 优先级：
# 1. 环境变量 OSH_GITHUB_TOKEN
# 2. 环境变量 GITHUB_TOKEN
# 3. 当前文件中的 token 字段

# GitHub Personal Access Token，可留空。
# 若仓库是私有仓库，或匿名请求频率不足，建议配置 token。
token: ""

repos:
  # 可直接运行的示例：GitHub CLI
  - id: github-cli
    owner: cli
    repo: cli
    name: GitHub CLI
    description: GitHub 官方命令行工具，支持 Pull Request、Issue、Release 等操作。
    organization: GitHub
    officialWebsite: https://cli.github.com/
    icon: https://github.githubassets.com/favicons/favicon.svg
    tags: [开发工具, 命令行]
    assets:
      - keywords: [windows, amd64, .msi]
        platform: Windows
        architecture: x64
      - keywords: [windows, arm64, .msi]
        platform: Windows
        architecture: arm64
      - keywords: [linux, amd64, .deb]
        platform: Linux
        architecture: x64
      - keywords: [linux, arm64, .deb]
        platform: Linux
        architecture: arm64
      - keywords: [macos, amd64, .zip]
        platform: macOS
        architecture: x64
      - keywords: [macos, arm64, .zip]
        platform: macOS
        architecture: arm64

  - id: openlist
    owner: openlistteam
    repo: openlist
    name: OpenList
    description: OpenList 是一个支持多存储的文件列表程序，可用于统一管理和访问网盘内容。
    organization: OpenList Team
    officialWebsite: https://github.com/openlistteam/openlist
    icon: https://cdn.jsdelivr.net/gh/OpenListTeam/OpenList-Resource@main/logo/logo.svg
    tags: [文件管理, 开发工具]
    assets:
      - keywords: [windows, amd64]
        platform: Windows
        architecture: x64
      - keywords: [windows, arm64]
        platform: Windows
        architecture: arm64
      - keywords: [linux, amd64]
        platform: Linux
        architecture: x64
      - keywords: [linux, arm64]
        platform: Linux
        architecture: arm64
      - keywords: [darwin, amd64]
        platform: macOS
        architecture: x64
      - keywords: [darwin, arm64]
        platform: macOS
        architecture: arm64

  - id: easytier
    owner: EasyTier
    repo: EasyTier
    name: EasyTier
    description: EasyTier 是一个去中心化的 Mesh VPN，支持 WireGuard。
    organization: EasyTier
    officialWebsite: https://easytier.cn
    icon: https://avatars.githubusercontent.com/u/169161851?v=4
    tags: [网络工具, VPN]
    assets:
      - keywords: [gui, x64, .exe]
        platform: Windows
        architecture: x64
      - keywords: [gui, x86_64, .exe]
        platform: Windows
        architecture: x64
      - keywords: [gui, arm64, .exe]
        platform: Windows
        architecture: arm64
      - keywords: [gui, x64, .dmg]
        platform: macOS
        architecture: x64
      - keywords: [gui, x86_64, .dmg]
        platform: macOS
        architecture: x64
      - keywords: [gui,aarch64,dmg]
        platform: macOS
        architecture: arm64
      - platform: Linux
        architecture: x64
        package: deb
        keywords: [gui,amd64, .deb]
      - platform: Linux
        architecture: arm64
        package: deb
        keywords: [gui,arm64, .deb]

      - platform: Linux
        architecture: x64
        package: rpm
        keywords: [gui,amd64, .rpm]
      - platform: Linux
        architecture: aarch64
        package: rpm
        keywords: [gui,aarch64, .rpm]

      - platform: Linux
        architecture: x64
        package: appimage
        keywords: [gui,amd64, .AppImage]
      - platform: Linux
        architecture: aarch64
        package: appimage
        keywords: [gui, aarch64, .AppImage]
  # 继续新增仓库时，按下面结构复制即可：
  # - id: neovim
  #   owner: neovim
  #   repo: neovim
  #   name: Neovim
  #   description: 现代化 Vim 编辑器。
  #   organization: Neovim
  #   officialWebsite: https://neovim.io/
  #   icon: https://neovim.io/logos/neovim-mark-flat.png
  #   assets:
  #     # keywords 使用 AND 逻辑，全部命中文件名/URL 才匹配，与具体分隔符无关
  #     # 下载链接标签自动使用真实文件名，与 releases 页面一致
  #     - keywords: [windows, x86_64, .zip]
  #       platform: Windows
  #       architecture: x64
  #     - keywords: [linux, x86_64, .tar.gz]
  #       platform: Linux
  #       architecture: x64
