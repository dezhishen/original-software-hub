# GitHub 插件配置
#
# 配置优先级：
# 1. 环境变量 OSH_GITHUB_CONFIG        直接传入整段 YAML 内容
# 2. 环境变量 OSH_GITHUB_CONFIG_PATH   指定 YAML 文件路径
# 3. 当前文件 config/github.yaml
#
# Token 优先级：
# 1. 环境变量 OSH_GITHUB_TOKEN
# 2. 环境变量 GITHUB_TOKEN
# 3. 当前文件中的 token 字段

# GitHub Personal Access Token，可留空。
# 若仓库是私有仓库，或匿名请求频率不足，建议配置 token。
token: ""

repos:
  # 可直接运行的示例：GitHub CLI
  - id: github-cli
    owner: cli
    repo: cli
    name: GitHub CLI
    description: GitHub 官方命令行工具，支持 Pull Request、Issue、Release 等操作。
    organization: GitHub
    officialWebsite: https://cli.github.com/
    icon: https://github.githubassets.com/favicons/favicon.svg
    assets:
      - keywords: [windows, amd64, .msi]
        platform: Windows
        architecture: x64
        label: Windows 安装包 (msi)
      - keywords: [windows, arm64, .msi]
        platform: Windows
        architecture: arm64
        label: Windows 安装包 (arm64)
      - keywords: [linux, amd64, .deb]
        platform: Linux
        architecture: x64
        label: Linux deb (x64)
      - keywords: [linux, arm64, .deb]
        platform: Linux
        architecture: arm64
        label: Linux deb (arm64)
      - keywords: [macos, amd64, .zip]
        platform: macOS
        architecture: x64
        label: macOS 压缩包 (x64)
      - keywords: [macos, arm64, .zip]
        platform: macOS
        architecture: arm64
        label: macOS 压缩包 (arm64)

  - id: openlist
    owner: openlistteam
    repo: openlist
    name: OpenList
    description: OpenList 是一个支持多存储的文件列表程序，可用于统一管理和访问网盘内容。
    organization: OpenList Team
    officialWebsite: https://github.com/openlistteam/openlist
    icon: https://raw.githubusercontent.com/openlistteam/openlist/main/public/logo.svg
    assets:
      - keywords: [windows, amd64]
        platform: Windows
        architecture: x64
        label: Windows 压缩包 (x64)
      - keywords: [windows, arm64]
        platform: Windows
        architecture: arm64
        label: Windows 压缩包 (arm64)
      - keywords: [linux, amd64]
        platform: Linux
        architecture: x64
        label: Linux tar.gz (x64)
      - keywords: [linux, arm64]
        platform: Linux
        architecture: arm64
        label: Linux tar.gz (arm64)
      - keywords: [darwin, amd64]
        platform: macOS
        architecture: x64
        label: macOS tar.gz (x64)
      - keywords: [darwin, arm64]
        platform: macOS
        architecture: arm64
        label: macOS tar.gz (arm64)

  # 继续新增仓库时，按下面结构复制即可：
  # - id: neovim
  #   owner: neovim
  #   repo: neovim
  #   name: Neovim
  #   description: 现代化 Vim 编辑器。
  #   organization: Neovim
  #   officialWebsite: https://neovim.io/
  #   icon: https://neovim.io/logos/neovim-mark-flat.png
