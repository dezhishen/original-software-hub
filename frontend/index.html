<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Original Software Hub</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("osh-dark-mode");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = saved !== null ? saved === "1" : prefersDark;
          document.documentElement.classList.toggle("dark", isDark);
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f3faf8",
                500: "#0f9d84",
                700: "#0b6b5a"
              }
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-[#fffcf4] via-[#f8fbf9] to-[#f2f7f5] text-slate-900 transition-colors dark:from-[#0d1117] dark:via-[#101826] dark:to-[#0f1d2b] dark:text-slate-100" style="font-family: 'Noto Sans SC', sans-serif;">
    <header id="homeHero" class="mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pt-9 pb-5 text-left">
      <p class="inline-flex rounded-full border border-brand-500/25 bg-brand-50/70 px-3 py-1 text-[11px] font-medium tracking-[0.08em] text-brand-700 dark:border-brand-500/35 dark:bg-slate-800/70 dark:text-brand-500" style="font-family: 'Space Grotesk', sans-serif;">ORIGINAL SOFTWARE HUB</p>
      <h1 class="mt-4 text-3xl font-semibold leading-tight md:text-5xl dark:text-slate-100" style="font-family: 'Space Grotesk', sans-serif;">常用软件下载导航</h1>
      <p class="mt-3 max-w-3xl text-[15px] leading-7 text-slate-600 dark:text-slate-400">
        帮你快速找到常见软件的官网、适合自己设备的版本，以及对应的官方下载方式。
      </p>
      <p id="homeHeroMeta" class="mt-3 text-sm text-slate-500 dark:text-slate-400"></p>
    </header>

    <header id="detailHero" class="mx-auto hidden w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pt-9 pb-5 text-left">
      <p class="inline-flex rounded-full border border-brand-500/25 bg-brand-50/70 px-3 py-1 text-[11px] font-medium tracking-[0.08em] text-brand-700 dark:border-brand-500/35 dark:bg-slate-800/70 dark:text-brand-500" style="font-family: 'Space Grotesk', sans-serif;">SOFTWARE DETAIL</p>
      <h1 id="detailHeroTitle" class="mt-4 text-3xl font-semibold leading-tight md:text-5xl dark:text-slate-100" style="font-family: 'Space Grotesk', sans-serif;">软件详情</h1>
      <p id="detailHeroDescription" class="mt-3 max-w-3xl text-[15px] leading-7 text-slate-600 dark:text-slate-400">查看软件介绍、版本发布时间和下载入口。</p>
      <p id="detailHeroMeta" class="mt-3 text-sm text-slate-500 dark:text-slate-400"></p>
    </header>

    <div id="loadingOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center gap-4 bg-white/90 backdrop-blur-sm transition-opacity duration-300 dark:bg-slate-900/90">
      <div class="h-11 w-11 animate-spin rounded-full border-4 border-brand-500/20 border-t-brand-500"></div>
      <p id="loadingMessage" class="text-sm text-slate-600 dark:text-slate-400">正在加载软件列表...</p>
    </div>

    <main class="mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pb-10">
      <section id="homeSection" class="rounded-2xl border border-slate-200/90 bg-white/92 p-4 shadow-[0_8px_20px_rgba(15,70,56,0.07)] md:p-6 dark:border-slate-700 dark:bg-slate-800/88 dark:shadow-[0_8px_20px_rgba(2,6,23,0.35)]">
        <div class="mb-4 grid gap-3 border-b border-slate-200 pb-4 dark:border-slate-700">
          <h2 class="text-left text-2xl font-medium dark:text-slate-100" style="font-family: 'Space Grotesk', sans-serif;">软件目录</h2>
          <input id="searchInput" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm outline-none ring-brand-500/20 transition focus:border-brand-500 focus:ring-4 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:placeholder-slate-500" type="search" placeholder="搜索软件名称 / 机构 / 标签（#社交）/ 拼音（weixin）" />
        </div>
        <div id="softwareList" class="grid h-[62vh] auto-rows-max content-start grid-cols-1 gap-4 overflow-y-auto overscroll-contain pt-2 pr-1 sm:grid-cols-3 xl:grid-cols-4" aria-live="polite"></div>
      </section>

      <section id="detailSection" class="hidden p-0">
        <div id="softwareDetail" class="min-h-[300px] text-left">
          <h2>正在准备详情</h2>
          <p>请稍候...</p>
        </div>
      </section>
    </main>

    <footer id="appFooter" class="mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pb-8 pt-2 text-xs text-slate-400 space-y-1 dark:text-slate-500"></footer>

    <button id="darkModeToggle" type="button" aria-label="切换夜间模式" class="fixed top-4 right-4 z-40 flex h-9 w-9 items-center justify-center rounded-full border border-slate-200 bg-white/90 text-slate-600 shadow-sm backdrop-blur-sm transition hover:border-brand-500/40 hover:text-brand-700 dark:border-slate-700 dark:bg-slate-800/90 dark:text-slate-300 dark:hover:text-brand-500"></button>

    <script src="./config.js"></script>
    <script src="./bundle-shared.js"></script>
    <script src="./bundle-app.js"></script>
  </body>
</html>
