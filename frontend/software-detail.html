<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>软件详情 - Original Software Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f3faf8",
                500: "#0f9d84",
                700: "#0b6b5a"
              }
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-[#fffef8] via-[#f4faf7] to-[#edf6f2] text-slate-900 transition-colors dark:from-[#0d1117] dark:via-[#111827] dark:to-[#0d1f2d] dark:text-slate-100" style="font-family: 'Noto Sans SC', sans-serif;">

    <nav class="sticky top-3 z-30 mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))]" aria-label="面包屑导航">
      <ol class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white/85 px-3 py-2 text-sm shadow-[0_10px_24px_rgba(15,70,56,0.10)] backdrop-blur-sm dark:border-slate-700 dark:bg-slate-800/85">
        <li><a class="font-semibold text-[#0a4f45] hover:underline dark:text-brand-500" href="./index.html">软件目录</a></li>
        <li aria-hidden="true" class="text-slate-400 dark:text-slate-600">/</li>
        <li id="breadcrumbCurrent" aria-current="page" class="font-semibold text-slate-700 dark:text-slate-200">详情</li>
      </ol>
    </nav>

    <header class="mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pt-6 pb-5 text-left">
      <p class="inline-flex rounded-full border border-brand-500/30 bg-brand-50 px-3 py-1 text-xs font-semibold tracking-[0.08em] text-brand-700 dark:border-brand-500/40 dark:bg-slate-800 dark:text-brand-500" style="font-family: 'Space Grotesk', sans-serif;">DOWNLOAD CENTER</p>
      <h1 class="mt-4 text-3xl font-bold leading-tight md:text-5xl dark:text-slate-100" style="font-family: 'Space Grotesk', sans-serif;">下载详情</h1>
      <p class="mt-3 max-w-3xl text-base leading-7 text-slate-600 dark:text-slate-400">查看软件介绍、版本发布时间与不同平台下载链接。</p>
      <div class="mt-5 flex flex-wrap items-center gap-3">
        <button id="smartBackButton" type="button" class="inline-flex items-center rounded-xl bg-brand-500 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 focus:outline-none focus:ring-4 focus:ring-brand-500/20">
          ← 返回上一页
        </button>
        <a href="./index.html" class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-brand-500/40 hover:text-brand-700 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300">
          回到软件目录
        </a>
      </div>
    </header>

    <div id="loadingOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center gap-4 bg-white/90 backdrop-blur-sm transition-opacity duration-300 dark:bg-slate-900/90">
      <div class="h-11 w-11 animate-spin rounded-full border-4 border-brand-500/20 border-t-brand-500"></div>
      <p class="text-sm text-slate-600 dark:text-slate-400">正在加载详情...</p>
    </div>

    <main class="mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pb-10">
      <section class="rounded-2xl border border-slate-200 bg-white/85 p-4 shadow-[0_12px_34px_rgba(15,70,56,0.10)] backdrop-blur-sm md:p-6 dark:border-slate-700 dark:bg-slate-800/85">
        <div id="softwareDetail" class="min-h-[300px] text-left">
          <h2>正在准备详情</h2>
          <p>请稍候...</p>
        </div>
      </section>
    </main>

    <footer id="appFooter" class="mx-auto w-[min(1600px,calc(100%-1rem))] md:w-[min(1600px,calc(100%-2.5rem))] pb-8 pt-2 text-xs text-slate-400 space-y-1 dark:text-slate-500"></footer>

    <button id="darkModeToggle" type="button" aria-label="切换夜间模式" class="fixed top-4 right-4 z-40 flex h-9 w-9 items-center justify-center rounded-full border border-slate-200 bg-white/90 text-slate-600 shadow-sm backdrop-blur-sm transition hover:border-brand-500/40 hover:text-brand-700 dark:border-slate-700 dark:bg-slate-800/90 dark:text-slate-300 dark:hover:text-brand-500"></button>

    <script src="./config.js"></script>
    <script src="./bundle-detail.js"></script>
  </body>
</html>
