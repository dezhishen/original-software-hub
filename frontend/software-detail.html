<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在跳转 - Original Software Hub</title>
    <script>
      (function () {
        var target = new URL("./index.html", window.location.href);
        var params = new URLSearchParams(window.location.search);
        var softwareId = params.get("id");
        if (softwareId) {
          target.searchParams.set("id", softwareId);
        }
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <p>正在跳转到统一入口...</p>
  </body>
</html>
