name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore previous version data from page branch
        run: |
          git fetch origin page --depth=1 2>/dev/null || true
          if git rev-parse origin/page >/dev/null 2>&1; then
            git checkout origin/page -- data/json/versions/ 2>/dev/null || true
            if [ -d data/json/versions ]; then
              mkdir -p frontend/data/json
              cp -r data/json/versions frontend/data/json/
              rm -rf data
              echo "Restored $(ls frontend/data/json/versions/ | wc -l) version files from page branch"
            fi
          else
            echo "page branch not found, skipping restore"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: data-cli/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate latest data
        working-directory: data-cli
        env:
          OSH_GITHUB_TOKEN: ${{ secrets.OSH_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . -concurrency 5 -schedule-order priority -skip-unchanged

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build minified frontend
        working-directory: frontend
        run: npm run build

      - name: Publish frontend (with data) to page branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: page
          folder: frontend/dist
          clean: true
          single-commit: true