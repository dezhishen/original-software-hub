name: Deploy Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  build-and-deploy-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: data-cli/go.mod

      - name: Generate latest data
        working-directory: data-cli
        env:
          OSH_GITHUB_TOKEN: ${{ secrets.OSH_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run .

      - name: Publish generated data to data branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: data
          folder: frontend/data
          clean: true
          single-commit: true

      - name: Purge jsDelivr CDN cache
        run: |
          # 枚举所有 jsonp 文件并逐一清除 jsDelivr 缓存
          REPO="dezhishen/original-software-hub"
          BRANCH="data"
          BASE="https://purge.jsdelivr.net/gh/${REPO}@${BRANCH}"

          FILES=$(find frontend/data/jsonp -type f -name "*.js" | sed 's|frontend/data/jsonp||')
          for f in $FILES; do
            URL="${BASE}/jsonp${f}"
            echo "Purging: $URL"
            curl -sf "$URL" -o /dev/null || echo "  warn: purge failed for $f"
          done
