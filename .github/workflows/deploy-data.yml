name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: data-cli/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate latest data
        working-directory: data-cli
        env:
          OSH_GITHUB_TOKEN: ${{ secrets.OSH_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run .

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build minified frontend
        working-directory: frontend
        run: npm run build

      - name: Publish frontend (with data) to page branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: page
          folder: frontend/dist
          clean: true
          single-commit: true